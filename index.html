<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Demo Forms - Clinical Intake</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="sidebar">
        <div class="sidebar-top">
            <button class="sidebar-btn-stacked" title="Guided Tour">
                <span class="material-symbols-outlined">explore</span>
                <span class="btn-label">Guided Tour</span>
            </button>
        </div>

        <div class="menu-group">
            <button class="icon-btn" title="Start"><span class="material-symbols-outlined">play_arrow</span></button>
            <button class="icon-btn" title="Pause"><span class="material-symbols-outlined">pause</span></button>
            <button class="icon-btn" title="Finish"><span class="material-symbols-outlined">check_circle</span></button>
            <button class="icon-btn" title="Repeat"><span class="material-symbols-outlined">replay</span></button>
            <button class="icon-btn" title="Skip"><span class="material-symbols-outlined">skip_next</span></button>
            <button class="icon-btn" title="Reset"><span class="material-symbols-outlined">restart_alt</span></button>
        </div>

        <div class="sidebar-bottom">
            <button class="sidebar-btn-stacked" title="Read Aloud">
                <span class="material-symbols-outlined">record_voice_over</span>
                <span class="btn-label">Read Aloud</span>
            </button>
        </div>
    </nav>

    <header class="top-config">
        <div class="dropdown-wrapper">
            <span class="material-symbols-outlined config-icon">language</span>
            <select class="config-select">
                <option value="en">English</option>
                <option value="es">Español (Spanish)</option>
                <option value="zh">中文 (Chinese)</option>
                <option value="hi">हिन्दी (Hindi)</option>
                <option value="ru">Русский (Russian)</option>
            </select>
        </div>
        <div class="dropdown-wrapper">
            <span class="material-symbols-outlined config-icon">description</span>
            <select class="config-select">
                <option value="admission">Admission Form</option>
                <option value="sleep">Sleep Form</option>
            </select>
        </div>
    </header>

    <main class="main-container">
        <h1 class="header-text">Hi, what should we dive into today?</h1>

        <form class="floating-form" onsubmit="event.preventDefault();">
            <textarea class="text-input" rows="3" placeholder="Type a message..."></textarea>
            
            <div class="form-controls">
                <div class="left-controls">
                    </div>
                <div class="right-controls">
                    <button type="button" class="icon-control-btn" id="mic-btn" title="Voice input">
                        <span class="material-symbols-outlined mic-icon">mic</span>
                    </button>
                </div>
            </div>
        </form>
    </main>

    <script>
        const micBtn = document.getElementById('mic-btn');
        micBtn.addEventListener('click', () => {
            micBtn.classList.toggle('flicker');
        });
    </script>

</body>
</html>
