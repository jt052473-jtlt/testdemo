<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Copilot Test Build</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="sidebar">
        <div class="menu-group">
            <button class="icon-btn" title="Start"><span class="material-symbols-outlined">play_arrow</span></button>
            <button class="icon-btn" title="Pause"><span class="material-symbols-outlined">pause</span></button>
            <button class="icon-btn" title="Finish"><span class="material-symbols-outlined">check_circle</span></button>
            <button class="icon-btn" title="Repeat"><span class="material-symbols-outlined">replay</span></button>
            <button class="icon-btn" title="Skip"><span class="material-symbols-outlined">skip_next</span></button>
            <button class="icon-btn" title="Reset"><span class="material-symbols-outlined">restart_alt</span></button>
        </div>
    </nav>

    <main class="main-container">
        <h1 class="header-text">Hi, what should we dive into today?</h1>

        <form class="floating-form" onsubmit="event.preventDefault();">
            <textarea class="text-input" rows="3" placeholder="Message Copilot..."></textarea>
            
            <div class="form-controls">
                <div class="left-controls">
                    <button type="button" class="action-btn">
                        <span class="material-symbols-outlined">add</span>
                    </button>
                    <button type="button" class="action-btn dropdown">
                        Smart <span class="material-symbols-outlined">expand_more</span>
                    </button>
                </div>
                <div class="right-controls">
                    <button type="button" class="icon-control-btn"><span class="material-symbols-outlined">eyeglasses</span></button>
                    <button type="button" class="icon-control-btn"><span class="material-symbols-outlined">mic</span></button>
                </div>
            </div>
        </form>

        <div class="suggestions-container">
            <button class="bubble-btn">Create an image</button>
            <button class="bubble-btn">Find the best deal</button>
            <button class="bubble-btn">Predict the future</button>
            <button class="bubble-btn">Take a quiz</button>
            <button class="bubble-btn">Improve writing</button>
        </div>
    </main>

</body>
</html>
