<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Demo Forms - Clinical Intake</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="modal-overlay">
        <div class="modal-card">
            <h1 class="modal-title">Clinical Intake Assistant</h1>
            <p class="modal-subtitle">Select your language to kick off an automated interactive layout demo, or skip to view the clean utility directly.</p>
            
            <div class="form-field">
                <label for="lang-select">Language</label>
                <select id="lang-select" class="styled-select">
                    <option value="en">English</option>
                </select>
            </div>

            <div class="form-field checkbox-field">
                <input type="checkbox" id="read-aloud" checked>
                <label for="read-aloud">Read Aloud Tour</label>
            </div>

            <div class="modal-actions">
                <button class="btn btn-primary">Start Guided Tour</button>
                <button class="btn btn-secondary">Exit to Main Screen</button>
            </div>
        </div>
    </div>
</body>
</html>
